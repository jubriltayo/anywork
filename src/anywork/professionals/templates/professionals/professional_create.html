{% extends 'base.html' %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>
<body>
    {% block header %}
        <h2>Become one of our esteemed professionals</h2>
    {% endblock %}

    {% block content %}
        <form action="." method="POST"> {% csrf_token %}
            {{ form.as_p }}
            <input type="submit" value="Register"/>
        </form>
    {% endblock %}
</body>
</html>
