{% extends 'base.html' %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>
<body>
    {% block header %}
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">    
                    <h2 class="py-3 text-danger">Become one of our esteemed professionals</h2>
    {% endblock %}

    {% block content %}
                    <form class="form" action="." method="POST"> {% csrf_token %}
                        {{ form.as_p }}
                        <input class="btn btn-danger" type="submit" value="Register"/>
                    </form>
                </div>
            </div>
        </div>
    {% endblock %}
</body>
</html>
